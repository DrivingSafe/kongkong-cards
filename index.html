<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fff8e9">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>Kong Kong Cards</title>
  <style>
@import url("https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;900&display=swap");

:root {
  --ink: #29323a;
  --cream: #fff5dc;
  --paper: #fffdf7;
  --orange: #ff6f61;
  --yellow: #ffd54f;
  --green: #73d68c;
  --blue: #63c7ff;
  --pink: #ff8fbd;
  --purple: #ad8cff;
  --mint: #71e3d6;
  --shadow: 0 10px 0 rgba(64, 52, 39, 0.12);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 7% 9%, rgba(255, 213, 79, .48) 0 7px, transparent 8px),
    radial-gradient(circle at 90% 18%, rgba(99, 199, 255, .45) 0 8px, transparent 9px),
    radial-gradient(circle at 22% 82%, rgba(255, 143, 189, .35) 0 10px, transparent 11px),
    linear-gradient(145deg, #fff8e9 0%, #ffeff7 45%, #eaf8ff 100%);
  font-family: "Jua", "Arial Rounded MT Bold", "Comic Sans MS", "Trebuchet MS", sans-serif;
  font-weight: 700;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

button { font: inherit; color: inherit; border: 0; cursor: pointer; }
h1, h2, h3, strong, .category-name, .buddy-wave {
  letter-spacing: .015em;
  text-shadow: 0 2px 0 rgba(255,255,255,.72);
}
.app-shell { width: min(100%, 920px); min-height: 100vh; margin: auto; padding: 18px clamp(16px, 4vw, 34px) 96px; }

.topbar { min-height: 54px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.brand { display: flex; gap: 8px; align-items: center; font-size: 22px; background: transparent; padding: 0; white-space: nowrap; }
.brand-dot { color: var(--orange); font-size: 17px; }
.top-actions { display: flex; align-items: center; gap: 8px; }
.language-button, .speech-mode-button, .settings-button, .visual-mode-button, .fullscreen-button {
  background: var(--yellow); border: 3px solid var(--ink); border-radius: 100px; padding: 8px 12px;
  box-shadow: 0 4px 0 var(--ink); font-family: Nunito, "Jua", sans-serif; font-weight: 900;
}
.speech-mode-button { background: var(--blue); white-space: nowrap; }
.visual-mode-button { background: #dff2e5; white-space: nowrap; }
.fullscreen-button { width: 43px; height: 43px; padding: 0; background: var(--mint); }
.language-button { background: var(--purple); color: white; }
.settings-button { width: 43px; height: 43px; padding: 0; background: white; }
.language-button:active, .speech-mode-button:active, .settings-button:active, .visual-mode-button:active, .fullscreen-button:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
.star-counter, .progress-pill {
  display: flex; align-items: center; gap: 7px; min-width: 66px; justify-content: center;
  background: white; border: 3px solid var(--ink); border-radius: 100px; padding: 7px 12px;
  box-shadow: 0 4px 0 var(--ink); font-family: Nunito, sans-serif; font-weight: 900;
}
.round-button {
  width: 46px; height: 46px; background: white; border: 3px solid var(--ink); border-radius: 50%;
  box-shadow: 0 4px 0 var(--ink); font-size: 26px;
}
.round-button:active, .star-counter:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
.hidden { visibility: hidden; }

.screen { display: none; animation: enter .35s ease both; }
.screen.active { display: block; }
@keyframes enter { from { opacity: 0; transform: translateY(10px); } }

.hero { display: grid; grid-template-columns: 1.4fr .7fr; align-items: center; padding: 28px 0 24px; }
.eyebrow { margin: 0 0 7px; color: var(--orange); font-size: 17px; letter-spacing: .04em; }
h1, h2, h3, p { margin-top: 0; }
h1 { margin-bottom: 12px; font-size: clamp(38px, 8vw, 62px); line-height: 1.03; letter-spacing: -.04em; }
h1 span { color: var(--orange); position: relative; }
.hero-note { margin: 0; font-size: 17px; color: #687076; }
.hero-buddy {
  position: relative; width: clamp(112px, 24vw, 170px); aspect-ratio: 1; justify-self: end;
  background: linear-gradient(145deg, #ffe57a, #ff9f6e); border: 4px solid var(--ink); border-radius: 48% 52% 45% 55%;
  box-shadow: var(--shadow); transform: rotate(3deg); transition: transform .2s;
}
.hero-buddy:active { transform: scale(.92) rotate(-3deg); }
.buddy-face { font-family: Nunito, sans-serif; font-size: clamp(32px, 7vw, 50px); }
.buddy-wave { position: absolute; top: -18px; right: -14px; background: white; padding: 8px 11px; border: 3px solid var(--ink); border-radius: 16px; transform: rotate(8deg); }
.buddy-rays { position: absolute; left: -17px; bottom: 9px; color: var(--orange); font-size: 27px; }

.section-title { display: flex; justify-content: space-between; align-items: baseline; margin: 16px 0 13px; }
.section-title h2, .card-heading h2 { margin: 0; font-size: 26px; }
.section-title span { color: #7b8388; }
.category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.category-card {
  position: relative; min-height: 142px; display: flex; flex-direction: column; justify-content: space-between; text-align: left;
  padding: 15px; border: 3px solid var(--ink); border-radius: 24px; box-shadow: var(--shadow);
  overflow: hidden; transition: transform .15s, box-shadow .15s; background-image: linear-gradient(145deg, rgba(255,255,255,.36), rgba(255,255,255,0));
}
.category-card:active { transform: translateY(6px) scale(.98); box-shadow: 0 4px 0 rgba(64, 52, 39, .12); }
.category-card::after { content: "●"; position: absolute; top: 10px; right: 13px; color: rgba(255,255,255,.65); }
.category-emoji { font-size: 51px; filter: drop-shadow(0 4px 0 rgba(255,255,255,.55)); }
.category-name { font-size: 21px; }
.category-card small { opacity: .65; }

.quiz-banner {
  width: 100%; margin-top: 22px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 13px;
  text-align: left; padding: 16px; background: linear-gradient(135deg, #ffffff, #fff1b8); border: 3px solid var(--ink); border-radius: 24px; box-shadow: var(--shadow);
}
.review-banner {
  width: 100%; margin-top: 14px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 13px;
  text-align: left; padding: 15px 18px; background: linear-gradient(135deg, #dff2e5, #c6f7ff); border: 3px solid var(--ink); border-radius: 24px; box-shadow: var(--shadow);
}
.install-banner {
  width: 100%; margin-top: 14px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 13px;
  text-align: left; padding: 15px 18px; background: linear-gradient(135deg, #ffe082, #ff9fcb); border: 3px solid var(--ink); border-radius: 24px; box-shadow: var(--shadow);
}
.install-banner span:first-child { font-size: 30px; }
.install-banner strong, .install-banner small { display: block; }
.install-banner small { color: #687076; }
.hidden-install { display: none; }
.review-banner span:first-child { font-size: 30px; }
.review-banner strong, .review-banner small { display: block; }
.review-banner small { color: #687076; }
.quiz-banner:active { transform: translateY(5px); box-shadow: 0 5px 0 rgba(64,52,39,.1); }
.quiz-icon { display: grid; place-items: center; width: 52px; height: 52px; border-radius: 50%; background: var(--orange); color: white; border: 3px solid var(--ink); font: 900 27px Nunito; }
.quiz-banner strong { display: block; font-size: 21px; }
.quiz-banner small { color: #7b8388; }
.quiz-arrow { font-size: 28px; }

.card-heading { display: flex; justify-content: space-between; align-items: center; padding: 34px 4px 16px; }
.heading-stats { display: flex; align-items: center; gap: 8px; }
.study-timer { padding: 8px 11px; background: var(--blue); border: 3px solid var(--ink); border-radius: 100px; box-shadow: 0 4px 0 var(--ink); font-family: Nunito, sans-serif; }
.flashcard-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin: 12px 0 42px; padding-bottom: 22px; }
.card-stack {
  position: absolute;
  width: min(76vw, 480px);
  aspect-ratio: .88;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
.stack-card {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 4px solid var(--ink);
  border-radius: 40px;
  box-shadow: 0 8px 0 rgba(41,50,58,.8);
  overflow: hidden;
}
.stack-card::after {
  content: "";
  position: absolute;
  inset: 18px;
  border: 3px dashed rgba(255,255,255,.46);
  border-radius: 26px;
}
.stack-card .stack-emoji {
  font-size: clamp(112px, 28.6vw, 195px);
  line-height: 1;
  filter: drop-shadow(0 6px 0 rgba(255,255,255,.5));
}
.photo-visual {
  position: relative;
  width: min(78%, 320px);
  aspect-ratio: 1.18;
  display: grid;
  place-items: center;
  overflow: hidden;
  border: 7px solid white;
  border-radius: 30px;
  background:
    radial-gradient(circle at 30% 18%, rgba(255,255,255,.95), transparent 34%),
    linear-gradient(140deg, rgba(255,255,255,.44), rgba(0,0,0,.08)),
    var(--paper);
  box-shadow: 0 10px 0 rgba(41,50,58,.24), inset 0 -18px 40px rgba(0,0,0,.08);
}
.photo-visual::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, rgba(255,255,255,.58), transparent 42%);
  pointer-events: none;
}
.photo-visual img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
}
.photo-visual .photo-emoji {
  font-size: clamp(125px, 28vw, 210px);
  filter: drop-shadow(0 10px 12px rgba(0,0,0,.22));
}
.flashcard.photo-mode .card-emoji {
  width: 100%;
  display: grid;
  place-items: center;
  font-size: inherit;
}
.stack-card .photo-visual {
  width: 68%;
  border-width: 5px;
  border-radius: 24px;
}
.stack-card .photo-visual .photo-emoji {
  font-size: clamp(86px, 19vw, 150px);
}
.stack-card strong {
  margin-top: 16px;
  font-size: clamp(28px, 6vw, 42px);
}
.stack-card:nth-child(1) { transform: translate(-11px, 28px) rotate(-3deg); opacity: .55; }
.stack-card:nth-child(2) { transform: translate(10px, 19px) rotate(2.3deg); opacity: .72; }
.stack-card:nth-child(3) { transform: translate(-4px, 10px) rotate(-1deg); opacity: .9; }
.flashcard {
  position: relative; z-index: 2; width: min(76vw, 480px); aspect-ratio: .88; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--yellow); border: 4px solid var(--ink); border-radius: 40px; box-shadow: 0 14px 0 var(--ink);
  overflow: hidden; user-select: none; touch-action: none; transition: background .25s, transform .15s;
}
.flashcard.dragging {
  transition: none;
  cursor: grabbing;
  box-shadow: 0 18px 0 var(--ink);
}
.flashcard:active { transform: translateY(4px); box-shadow: 0 10px 0 var(--ink); }
.card-emoji { font-size: clamp(150px, 36.4vw, 247px); line-height: 1.05; filter: drop-shadow(0 8px 0 rgba(255,255,255,.6)); }
.flashcard h3 { margin: 12px 0 0; font-size: clamp(38px, 8vw, 56px); transform: rotate(-1deg); }
.flashcard p { margin: 0; min-height: 28px; color: rgba(41,50,58,.68); font-size: 21px; }
.tap-hint { position: absolute; top: 18px; left: 20px; background: rgba(255,255,255,.75); padding: 7px 12px; border-radius: 100px; }
.sound-button { margin-top: 16px; padding: 9px 15px; border: 2px solid var(--ink); border-radius: 100px; background: white; box-shadow: 0 3px 0 var(--ink); }
.card-sparkles span { position: absolute; font-size: 24px; opacity: .45; }
.card-sparkles span:nth-child(1) { top: 18%; right: 14%; }
.card-sparkles span:nth-child(2) { bottom: 24%; left: 10%; }
.card-sparkles span:nth-child(3) { bottom: 12%; right: 15%; }
.dots { display: flex; justify-content: center; gap: 8px; margin: 25px 0 12px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #d5d3c9; transition: .2s; }
.dot.active { width: 28px; border-radius: 10px; background: var(--orange); }
.swipe-hint { text-align: center; color: #858a8c; font-size: 15px; }

.quiz-header { text-align: center; padding: 42px 0 20px; }
.quiz-header h2 { margin-bottom: 12px; font-size: clamp(30px, 7vw, 44px); }
.listen-prompt { padding: 10px 16px; border: 3px solid var(--ink); border-radius: 100px; background: white; box-shadow: 0 4px 0 var(--ink); }
.quiz-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 220px)); justify-content: center; gap: 16px; }
.quiz-choice {
  aspect-ratio: 1; display: grid; place-items: center; background: white; border: 4px solid var(--ink); border-radius: 30px;
  box-shadow: 0 9px 0 var(--ink); font-size: clamp(75px, 20vw, 130px); transition: .15s;
}
.quiz-choice:active { transform: translateY(6px); box-shadow: 0 3px 0 var(--ink); }
.quiz-choice.correct { background: #bfe8c7; animation: happy .55s ease; }
.quiz-choice.wrong { animation: nope .3s ease; }
.quiz-feedback { height: 72px; display: grid; place-items: center; padding-top: 22px; color: var(--orange); font-size: 27px; }
@keyframes happy { 50% { transform: scale(1.1) rotate(4deg); } }
@keyframes nope { 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); } }

.celebration { pointer-events: none; position: fixed; inset: 0; z-index: 10; overflow: hidden; display: none; }
.celebration.show { display: block; }
.celebration span { position: absolute; top: 50%; left: 50%; font-size: 34px; animation: burst .8s ease-out forwards; }
.celebration span:nth-child(1) { --x: -130px; --y: -150px; }
.celebration span:nth-child(2) { --x: 130px; --y: -170px; }
.celebration span:nth-child(3) { --x: -170px; --y: 30px; }
.celebration span:nth-child(4) { --x: 160px; --y: 50px; color: var(--orange); }
.celebration span:nth-child(5) { --x: 0px; --y: -210px; color: var(--blue); }
@keyframes burst { to { transform: translate(var(--x), var(--y)) rotate(160deg) scale(.4); opacity: 0; } }
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 20; align-items: center; justify-content: center;
  padding: 18px; background: rgba(41,50,58,.56); backdrop-filter: blur(5px);
}
.modal-overlay.show { display: flex; }
.parent-panel, .completion-panel {
  position: relative; width: min(100%, 560px); max-height: 90vh; overflow: auto; padding: 28px;
  background: var(--cream); border: 4px solid var(--ink); border-radius: 32px; box-shadow: 0 12px 0 var(--ink);
}
.modal-close { position: absolute; right: 16px; top: 13px; background: transparent; font-size: 34px; }
.setting-label { display: block; margin: 20px 0 9px; font-size: 18px; color: #687076; }
.setting-row { display: flex; gap: 9px; }
.setting-choice {
  flex: 1; padding: 11px; background: white; border: 3px solid var(--ink); border-radius: 16px; box-shadow: 0 4px 0 var(--ink);
}
.setting-choice.selected { background: var(--yellow); }
.category-settings { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.category-toggle { padding: 10px; text-align: left; background: white; border: 3px solid var(--ink); border-radius: 15px; opacity: .55; }
.category-toggle.selected { opacity: 1; background: #dff2e5; }
.save-settings { width: 100%; margin-top: 24px; padding: 14px; background: var(--orange); color: white; border: 3px solid var(--ink); border-radius: 18px; box-shadow: 0 5px 0 var(--ink); font-size: 20px; }
.completion-panel { text-align: center; overflow: visible; }
.big-sticker { font-size: 110px; animation: happy .8s ease infinite alternate; }
.sticker-shelf { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; font-size: 30px; min-height: 42px; }

@media (max-width: 620px) {
  .app-shell { padding-top: 10px; }
  .hero { padding-top: 20px; }
  .category-grid { grid-template-columns: repeat(2, 1fr); gap: 11px; }
  .category-card { min-height: 122px; padding: 13px; border-radius: 21px; }
  .category-emoji { font-size: 43px; }
  .flashcard { width: min(82vw, 430px); }
  .card-stack { width: min(82vw, 430px); }
  .brand { font-size: 18px; }
  .language-button { padding: 7px 9px; }
  .top-actions {
    position: fixed; left: 10px; right: 10px; bottom: 10px; z-index: 18;
    display: grid; grid-template-columns: 42px 42px 1fr 1fr 1fr 58px; gap: 6px;
    padding: 9px; background: rgba(255,255,255,.9); border: 3px solid var(--ink); border-radius: 24px;
    box-shadow: 0 7px 0 var(--ink); backdrop-filter: blur(8px);
  }
  .top-actions .settings-button,
  .top-actions .fullscreen-button,
  .top-actions .visual-mode-button,
  .top-actions .speech-mode-button,
  .top-actions .language-button,
  .top-actions .star-counter {
    position: static; width: auto; height: 44px; min-width: 0; padding: 6px 7px; font-size: 13px;
    box-shadow: 0 3px 0 var(--ink);
  }
  .top-actions .settings-button { font-size: 18px; }
  .top-actions .star-counter { gap: 2px; }
  .star-counter { min-width: 58px; padding: 7px 9px; }
}

@media (max-height: 720px) {
  .hero { padding: 10px 0; }
  .category-card { min-height: 108px; }
  .category-emoji { font-size: 38px; }
  .quiz-banner { margin-top: 14px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="round-button hidden" id="backButton" aria-label="Go home">←</button>
      <button class="brand" id="brand"><span class="brand-dot">●</span><span id="brandText">콩콩 카드</span></button>
      <div class="top-actions">
        <button class="settings-button" id="settingsButton" aria-label="보호자 설정">⚙️</button>
        <button class="fullscreen-button" id="fullscreenButton" aria-label="전체 화면"></button>
        <button class="visual-mode-button" id="visualModeButton" aria-label="그림 모드"></button>
        <button class="speech-mode-button" id="speechModeButton" aria-label="음성 모드"></button>
        <button class="language-button" id="languageButton">English</button>
        <div class="star-counter" aria-label="Stars"><span>⭐</span><span id="starCount">0</span></div>
      </div>
    </header>

    <main>
      <section class="screen home-screen active" id="homeScreen">
        <div class="hero">
          <div class="hero-copy">
            <p class="eyebrow" id="heroEyebrow"></p>
            <h1 id="heroTitle"></h1>
            <p class="hero-note" id="heroNote"></p>
          </div>
          <button class="hero-buddy" id="heroBuddy" aria-label="Say hello">
            <span class="buddy-rays">✦</span>
            <span class="buddy-face">◕‿◕</span>
            <span class="buddy-wave" id="buddyWave"></span>
          </button>
        </div>
        <div class="section-title"><h2 id="categoryTitle"></h2><span id="categoryCount"></span></div>
        <div class="category-grid" id="categoryGrid"></div>
        <button class="quiz-banner" id="startQuiz">
          <span class="quiz-icon">?</span>
          <span><strong id="quizBannerTitle"></strong><small id="quizBannerNote"></small></span>
          <span class="quiz-arrow">→</span>
        </button>
        <button class="review-banner" id="startReview">
          <span>🔁</span><span><strong id="reviewTitle"></strong><small id="reviewNote"></small></span><span>→</span>
        </button>
        <button class="install-banner hidden-install" id="installApp">
          <span>📲</span><span><strong id="installTitle"></strong><small id="installNote"></small></span><span>+</span>
        </button>
      </section>

      <section class="screen card-screen" id="cardScreen">
        <div class="card-heading">
          <div><p class="eyebrow" id="categoryLabel"></p><h2 id="cardHeading"></h2></div>
          <div class="progress-pill"><span id="cardPosition">1</span> / <span id="cardTotal">15</span></div>
        </div>
        <div class="flashcard-wrap" id="flashcardWrap">
          <div class="card-stack" id="cardStack" aria-hidden="true"></div>
          <article class="flashcard" id="flashcard" tabindex="0" aria-live="polite">
            <span class="tap-hint" id="tapHint"></span>
            <div class="card-sparkles"><span>✦</span><span>●</span><span>✦</span></div>
            <div class="card-emoji" id="cardEmoji"></div>
            <h3 id="cardWord"></h3>
            <p id="cardSound"></p>
            <div class="sound-button" id="soundButton"></div>
          </article>
        </div>
        <div class="dots" id="dots"></div>
        <p class="swipe-hint" id="swipeHint"></p>
      </section>

      <section class="screen quiz-screen" id="quizScreen">
        <div class="quiz-header">
          <p class="eyebrow" id="quizEyebrow"></p>
          <h2 id="quizPrompt"></h2>
          <button class="listen-prompt" id="listenPrompt"></button>
        </div>
        <div class="quiz-grid" id="quizGrid"></div>
        <div class="quiz-feedback" id="quizFeedback" aria-live="assertive"></div>
      </section>
    </main>
    <div class="celebration" id="celebration" aria-hidden="true">
      <span>⭐</span><span>✦</span><span>⭐</span><span>●</span><span>✦</span>
    </div>
    <div class="modal-overlay" id="settingsModal" aria-hidden="true">
      <section class="parent-panel" role="dialog" aria-modal="true">
        <button class="modal-close" id="closeSettings">×</button>
        <h2 id="settingsTitle"></h2>
        <label class="setting-label" id="languageSettingLabel"></label>
        <div class="setting-row">

function preferredVoice() {
  const prefix = language === "ko" ? "ko" : "en";
  const matching = availableVoices.filter(voice => voice.lang.toLowerCase().startsWith(prefix));
  return matching.sort((a, b) => {
    const score = voice => {
      const name = voice.name.toLowerCase();
      let value = 0;
      if (/premium|enhanced|natural|neural|siri/.test(name)) value += 12;
      if (/google|apple|microsoft/.test(name)) value += 5;
      if (/compact|espeak/.test(name)) value -= 10;
      if (voice.localService) value += 2;
      return value;
    };
    return score(b) - score(a);
  })[0];
}

  if (voice) utterance.voice = voice;
  utterance.rate = language === "ko" ? .92 : .88;

}

  const allCards = categories.flatMap(category => category.cards);
  const difficult = allCards.filter(card => mistakes[card[0]]).sort((a, b) => mistakes[b[0]] - mistakes[a[0]]);
  if (!difficult.length) { startQuiz(); return; }
  currentCategory = { names:[copy.ko.reviewTitle, copy.en.reviewTitle], color:"#a9d7c5", cards:difficult };
  const weighted = difficult.flatMap(card => Array(Math.min(3, mistakes[card[0]])).fill(card));
  sessionCards = shuffled(weighted).slice(0, Math.min(sessionCount, weighted.length)); cardIndex = 0; viewedCards = 1;
  $("#cardTotal").textContent = sessionCards.length; sessionCompleted = false; renderCard(); showScreen("cardScreen"); speakCard(sessionCards[0]);
}
function renderQuizPrompt() {
  $("#quizPrompt").textContent = language === "ko" ? `${cardWord(quizAnswer.card)}${copy.ko.findEnd}` : `${copy.en.findEnd}${cardWord(quizAnswer.card)}!`;
}
function startQuiz() {
  const pool = categories.flatMap(category => category.cards.map(card => ({ card, color: category.color })));
  quizAnswer = pool[Math.floor(Math.random() * pool.length)];
  const choices = [quizAnswer];
  while (choices.length < 4) { const choice = pool[Math.floor(Math.random() * pool.length)]; if (!choices.some(item => item.card[0] === choice.card[0])) choices.push(choice); }
  choices.sort(() => Math.random() - .5); quizLocked = false; renderQuizPrompt(); $("#quizFeedback").textContent = "";
  $("#quizGrid").innerHTML = choices.map(item => `<button class="quiz-choice" data-emoji="${item.card[0]}" aria-label="${cardWord(item.card)}">${item.card[0]}</button>`).join("");
  showScreen("quizScreen"); setTimeout(() => speak($("#quizPrompt").textContent), 250);
}
function answerQuiz(button) {
  if (quizLocked) return;
  if (button.dataset.emoji === quizAnswer.card[0]) {
    if (mistakes[quizAnswer.card[0]]) {
      mistakes[quizAnswer.card[0]] = Math.max(0, mistakes[quizAnswer.card[0]] - 1);
      saveSetting("kongkong-mistakes", JSON.stringify(mistakes));
    }
    quizLocked = true; button.classList.add("correct"); $("#quizFeedback").textContent = copy[language].correct; speak(copy[language].correctSpeech); addStar(); setTimeout(startQuiz, 1500);
  } else {
    mistakes[quizAnswer.card[0]] = (mistakes[quizAnswer.card[0]] || 0) + 1;
    saveSetting("kongkong-mistakes", JSON.stringify(mistakes));
    button.classList.add("wrong"); $("#quizFeedback").textContent = copy[language].retry; speak(copy[language].retry); setTimeout(() => button.classList.remove("wrong"), 400);
  }
}
function renderSettings() {
  document.querySelectorAll(".setting-choice").forEach(button => button.classList.toggle("selected", button.dataset.language === language));
  $("#categorySettings").innerHTML = categories.map(item => `<button class="category-toggle ${enabledIds.includes(item.id) ? "selected" : ""}" data-id="${item.id}">${item.cover} ${item.names[langIndex()]}</button>`).join("");
}
function toggleModal(id, show) {
  $(id).classList.toggle("show", show); $(id).setAttribute("aria-hidden", String(!show));
}

$("#starCount").textContent = stars; applyLanguage();
$("#languageButton").addEventListener("click", () => { language = language === "ko" ? "en" : "ko"; saveSetting("kongkong-language", language); applyLanguage(); });
$("#visualModeButton").addEventListener("click", () => { visualMode = visualMode === "photo" ? "cute" : "photo"; saveSetting("kongkong-visual-mode", visualMode); applyLanguage(); });
$("#fullscreenButton").addEventListener("click", async () => {
  try {
    if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
    if (screen.orientation && screen.orientation.lock) screen.orientation.lock("portrait").catch(() => {});
  } catch (_) {}
});
$("#speechModeButton").addEventListener("click", () => { speechMode = speechMode === "word" ? "full" : "word"; saveSetting("kongkong-speech-mode", speechMode); applyLanguage(); speakCard(sessionCards[cardIndex] || currentCategory.cards[0]); });
$("#categoryGrid").addEventListener("click", event => { const button = event.target.closest(".category-card"); if (button) openCategory(Number(button.dataset.index)); });
$("#backButton").addEventListener("click", () => showScreen("homeScreen")); $("#brand").addEventListener("click", () => showScreen("homeScreen"));
$("#heroBuddy").addEventListener("click", () => { speak(copy[language].helloSpeech); playAnimation($("#heroBuddy"), [{transform:"rotate(3deg)"},{transform:"rotate(-8deg) scale(1.08)"},{transform:"rotate(3deg)"}],{duration:550}); });
$("#startQuiz").addEventListener("click", startQuiz);
$("#startReview").addEventListener("click", startReview);
$("#installApp").addEventListener("click", async () => {
  if (installPromptEvent) {
    installPromptEvent.prompt();
    await installPromptEvent.userChoice.catch(() => {});
    installPromptEvent = null;
    $("#installApp").classList.add("hidden-install");
  } else {
    speak(language === "ko" ? "브라우저 메뉴에서 홈 화면에 추가를 눌러주세요." : "Use the browser menu and choose Add to Home Screen.");
  }
});
$("#settingsButton").addEventListener("click", () => toggleModal("#settingsModal", true));
$("#closeSettings").addEventListener("click", () => toggleModal("#settingsModal", false));
document.querySelectorAll(".setting-choice").forEach(button => button.addEventListener("click", () => { language = button.dataset.language; renderSettings(); }));
$("#categorySettings").addEventListener("click", event => {
  const button = event.target.closest(".category-toggle"); if (!button) return;
  enabledIds = enabledIds.includes(button.dataset.id) ? enabledIds.filter(id => id !== button.dataset.id) : [...enabledIds, button.dataset.id];
  if (!enabledIds.length) enabledIds = [button.dataset.id]; renderSettings();
});
$("#saveSettings").addEventListener("click", () => {
  saveSetting("kongkong-language", language);
  saveSetting("kongkong-enabled-categories", JSON.stringify(enabledIds)); toggleModal("#settingsModal", false); applyLanguage(); showScreen("homeScreen");
});
$("#finishSession").addEventListener("click", () => { toggleModal("#completionModal", false); showScreen("homeScreen"); });
$("#flashcard").addEventListener("click", () => { if (didSwipe) { didSwipe = false; return; } const data = sessionCards[cardIndex]; speakCard(data); playAnimation($("#cardEmoji"), [{transform:"scale(1)"},{transform:"scale(1.16) rotate(4deg)"},{transform:"scale(1)"}],{duration:450}); });
$("#flashcard").addEventListener("keydown", event => { if (event.key === "Enter" || event.key === " ") $("#flashcard").click(); if (event.key.startsWith("Arrow")) nextCard(); });
$("#flashcard").addEventListener("pointerdown", event => {
  event.preventDefault();
  unlockSpeech(); drag = { active:true, pointerId:event.pointerId, x:event.clientX, y:event.clientY, dx:0, dy:0 }; didSwipe = false;
  $("#flashcard").classList.add("dragging"); $("#flashcard").setPointerCapture?.(event.pointerId);
});
$("#flashcard").addEventListener("pointermove", event => {
  if (!drag.active || event.pointerId !== drag.pointerId) return;
  event.preventDefault();
  drag.dx = event.clientX - drag.x; drag.dy = event.clientY - drag.y;
  const tilt = Math.max(-8, Math.min(8, drag.dx / 18));
  $("#flashcard").style.transform = `translate3d(${drag.dx}px, ${drag.dy}px, 0) rotate(${tilt}deg) scale(.98)`;
});
function finishDrag(event) {
  if (!drag.active || event.pointerId !== drag.pointerId) return;
  drag.active = false;
  const distance = Math.hypot(drag.dx, drag.dy);
  const direction = { x: Math.sign(drag.dx) || 1, y: Math.sign(drag.dy) };
  $("#flashcard").classList.remove("dragging"); $("#flashcard").style.transform = "";
  if (distance > 42) { didSwipe = true; nextCard(direction); }
}
$("#flashcard").addEventListener("pointerup", finishDrag);
$("#flashcard").addEventListener("pointercancel", finishDrag);
document.addEventListener("contextmenu", event => event.preventDefault());
document.addEventListener("dblclick", event => event.preventDefault());
$("#listenPrompt").addEventListener("click", () => speak($("#quizPrompt").textContent));
$("#quizGrid").addEventListener("click", event => { const button = event.target.closest(".quiz-choice"); if (button) answerQuiz(button); });
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) navigator.serviceWorker.register("service-worker.js");
window.addEventListener("beforeinstallprompt", event => {
  event.preventDefault();
  installPromptEvent = event;
  $("#installApp").classList.remove("hidden-install");
});
window.addEventListener("appinstalled", () => $("#installApp").classList.add("hidden-install"));

  </script>
</body>
</html>
